<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namma Convo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --surface-hover: #FFFFFF;
      --border: rgba(0, 0, 0, 0.06);
      --text-primary: #1D1D1F;
      --text-secondary: #86868B;
      --accent: #000000;
      --accent-light: rgba(0, 0, 0, 0.05);

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;

      --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 10px 40px rgba(0, 0, 0, 0.08);
      --shadow-active: 0 2px 6px rgba(0, 0, 0, 0.04);
      --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.02);

      --transition-snappy: 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── TYPOGRAPHY ─── */
    h1, h2, h3 {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 32px 24px 0;
      background: rgba(245, 245, 247, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      max-width: 860px;
      margin: 0 auto 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-primary);
    }

    .logo-sub {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .lang-tabs {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .lang-tabs::-webkit-scrollbar {
      display: none;
    }

    .lang-tab {
      padding: 12px 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color var(--transition-snappy);
      white-space: nowrap;
    }

    .lang-tab:hover {
      color: var(--text-primary);
    }

    .lang-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    /* ─── MAIN ─── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 120px;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* ─── LESSON HEADER ─── */
    .lesson-header {
      margin-bottom: 24px;
    }

    .lesson-eyebrow {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .lesson-title {
      font-size: 40px;
      line-height: 1.1;
      margin-bottom: 16px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .lesson-desc {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 640px;
      line-height: 1.4;
    }

    /* ─── STATS ─── */
    .stats-row {
      display: flex;
      gap: 32px;
      margin-bottom: 64px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ─── SCENE GRID ─── */
    .section-label {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .scene-card {
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: var(--radius-lg);
      padding: 32px;
      cursor: pointer;
      transition: transform var(--transition-snappy), box-shadow var(--transition-snappy);
      text-align: left;
      box-shadow: var(--shadow-card);
      will-change: transform, box-shadow;
    }

    .scene-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    
    .scene-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-active);
    }

    .scene-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .scene-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .scene-count {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ─── PHRASE CARDS ─── */
    .phrase-card {
      background: transparent;
      border-bottom: 1px solid var(--border);
      padding: 24px;
      cursor: pointer;
      transition: all var(--transition-snappy);
      position: relative;
      display: flex;
      flex-direction: column;
      will-change: transform, background;
      border-radius: var(--radius-md);
    }

    .phrase-card:first-child {
      border-top: 1px solid var(--border);
    }

    .phrase-card:hover {
      background: var(--surface);
      border-bottom-color: transparent;
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }
    
    .phrase-card:active {
      transform: scale(0.98);
    }

    .phrase-header {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .phrase-number {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 2px;
      min-width: 24px;
    }

    .phrase-english {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
      letter-spacing: -0.01em;
    }

    .phrase-detail {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all var(--transition-snappy);
      padding-left: 48px;
    }

    .phrase-card.expanded {
      background: var(--surface);
      border-bottom-color: transparent;
      margin: 12px 0;
      box-shadow: var(--shadow-hover);
      transform: none; /* Reset active scale */
    }
    
    .phrase-card.expanded:active {
      transform: scale(0.99); /* Less squish when expanded */
    }

    .phrase-card.expanded .phrase-detail {
      max-height: 400px;
      opacity: 1;
      margin-top: 24px;
    }

    .phrase-script {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .phrase-native {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .phrase-transliteration {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-weight: 500;
    }

    .phrase-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .word-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer;
      transition: all var(--transition-snappy);
      user-select: none;
    }

    .word-chip:hover {
      background: var(--surface);
      border-color: var(--text-secondary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .word-chip:active {
      transform: scale(0.96);
    }

    @keyframes chip-pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.1); }
      70% { box-shadow: 0 0 0 6px rgba(0, 0, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
    }

    .word-chip.speaking {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
      animation: chip-pulse 1.5s infinite;
    }

    .word-chip.speaking span {
      color: var(--bg);
      opacity: 0.8;
    }

    .word-chip span {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ─── TIP CARD ─── */
    .tip-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 24px 32px;
      margin-top: 48px;
      font-size: 15px;
      color: var(--text-secondary);
      display: flex;
      gap: 16px;
      align-items: flex-start;
      box-shadow: var(--shadow-sm);
    }

    .tip-card strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ─── UTILS ─── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 32px;
      transition: all var(--transition-snappy);
    }

    .back-link .chevron {
      font-size: 24px;
      font-weight: 400;
      line-height: 1;
      margin-top: -2px;
      transition: transform var(--transition-snappy);
    }

    .back-link:hover {
      color: var(--text-primary);
    }

    .back-link:hover .chevron {
      transform: translateX(-4px);
    }
    
    .back-link:active {
      transform: scale(0.95);
    }

    .progress-bar {
      height: 6px;
      background: rgba(0,0,0,0.06);
      border-radius: 3px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--text-primary);
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* ─── AUDIO & TTS STYLE ─── */
    .lesson-meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .lesson-meta-bar .back-link {
      margin-bottom: 0;
    }

    .speed-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-snappy);
      box-shadow: var(--shadow-sm);
    }

    .speed-toggle-btn:hover {
      border-color: var(--text-secondary);
      transform: translateY(-1px);
    }

    .speed-toggle-btn:active {
      transform: scale(0.97);
    }

    .speed-toggle-btn.active {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }

    .speaker-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-snappy);
      margin-left: auto;
      z-index: 5;
    }

    .speaker-btn:hover {
      background: var(--accent-light);
      color: var(--text-primary);
      transform: scale(1.1);
    }

    .speaker-btn:active {
      transform: scale(0.95);
    }

    .speaker-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @keyframes soundwave {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    .speaker-btn.speaking {
      color: var(--text-primary);
      background: var(--accent-light);
      animation: soundwave 1.2s infinite ease-in-out;
    }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      .header {
        padding: 16px 16px 0;
      }

      .main {
        padding: 24px 16px 80px;
      }

      .lesson-title {
        font-size: 32px;
      }

      .lesson-desc {
        font-size: 16px;
      }

      .stats-row {
        gap: 24px;
        margin-bottom: 48px;
        flex-wrap: wrap;
      }

      .stat-num {
        font-size: 28px;
      }

      .scene-grid {
        grid-template-columns: 1fr;
      }

      .phrase-card {
        padding: 20px 16px;
      }

      .phrase-card.expanded {
        margin: 8px 0;
      }

      .phrase-detail {
        padding-left: 0;
      }

      .phrase-english {
        font-size: 18px;
      }

      .phrase-native {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-top">
      <div class="logo">Namma Convo</div>
    </div>
    <div class="lang-tabs">
      <button class="lang-tab active" onclick="setLang('kn',this)">Kannada</button>
      <button class="lang-tab" onclick="setLang('ta',this)">Tamil</button>
      <button class="lang-tab" onclick="setLang('te',this)">Telugu</button>
      <button class="lang-tab" onclick="setLang('hi',this)">Hindi</button>
      <button class="lang-tab" onclick="setLang('ml',this)">Malayalam</button>
    </div>
  </div>

  <div class="main">
    <div class="view active" id="view-home">
      <div class="lesson-header">
        <div class="lesson-desc" id="lang-desc">Practical phrases for daily life in Karnataka. Locals always appreciate
          the effort — even a few words go a long way.</div>
      </div>
      <div class="scene-grid" id="scene-grid"></div>
      <div class="tip-card" id="home-tip"></div>
    </div>

    <div class="view" id="view-lesson">
      <div class="lesson-meta-bar">
        <div class="back-link" onclick="showHome()"><span class="chevron">&#8249;</span> Back</div>
        <button class="speed-toggle-btn" id="speed-toggle" onclick="toggleSpeed()" title="Toggle slow pronunciation">
          <span class="speed-icon">🐢</span>
          <span class="speed-text">Slow Mode: Off</span>
        </button>
      </div>
      <div class="lesson-header">
        <div class="lesson-title" id="lesson-title"></div>
        <div class="lesson-desc" id="lesson-desc"></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="lesson-progress"></div>
      </div>
      <div id="phrases-container"></div>
    </div>
  </div>

  <script>
    const DB = {
      kn: {
        desc: ' Locals always appreciate the effort, even if you just mix a few Kannada words with English!',
        tip: 'If you ever get stuck, just smile and say "Kannada swalpa swalpa barutte" (I only know a little bit of Kannada). It instantly lightens the mood and shows you are trying!',
        scenes: [
          {
            id: 'auto', icon: '🛺', name: 'Auto Driver', count: 10,
            desc: 'When interacting with auto drivers in Bengaluru or other parts of Karnataka, a polite Namaskara saar (Hello, sir) goes a long way.',
            phrases: [
              { en: 'Will you come to [Location]?', native: '[Location] ge barthira?', script: '[Location] ಗೆ ಬರ್ತೀರಾ?', roman: 'ge = to · barthira = will you come?', words: [{ w: 'ge', m: 'to' }, { w: 'barthira', m: 'will you come?' }] },
              { en: 'How much will it cost to go there?', native: 'Alli ge eshtu agutte?', script: 'ಅಲ್ಲಿಗೆ ಎಷ್ಟು ಆಗುತ್ತೆ?', roman: 'Alli = there · eshtu = how much', words: [{ w: 'Alli', m: 'there' }, { w: 'eshtu', m: 'how much' }, { w: 'agutte', m: 'will it be?' }] },
              { en: 'Please turn on the meter.', native: 'Meter haki, sir.', script: 'ಮೀಟರ್ ಹಾಕಿ, ಸರ್.', roman: 'haki = put / turn on', words: [{ w: 'Meter', m: 'meter' }, { w: 'haki', m: 'put/turn on' }] },
              { en: 'I am standing at the location.', native: 'Location alli nintu kondidini.', script: 'ಲೊಕೇಶನ್ ಅಲ್ಲಿ ನಿಂತು ಕೊಂಡಿದ್ದೀನಿ.', roman: 'alli = at · nintu kondidini = standing', words: [{ w: 'alli', m: 'at / there' }, { w: 'nintu', m: 'standing' }, { w: 'kondidini', m: 'I am' }] },
              { en: 'Can you show the scanner / QR code?', native: 'Scanner thoristhira?', script: 'ಸ್ಕ್ಯಾನರ್ ತೋರಿಸ್ತೀರಾ?', roman: 'thoristhira = will you show?', words: [{ w: 'thoristhira', m: 'will you show?' }] },
              { en: 'Please go straight, then take a left.', native: 'Straight hogi, aamele left thagolli.', script: 'ಸ್ಟ್ರೈಟ್ ಹೋಗಿ, ಆಮೇಲೆ ಲೆಫ್ಟ್ ತಗೊಳ್ಳಿ.', roman: 'hogi = go · aamele = then · thagolli = take', words: [{ w: 'hogi', m: 'go' }, { w: 'aamele', m: 'then' }, { w: 'thagolli', m: 'take' }] },
              { en: 'Please drive a little slower.', native: 'Swalpa mellage hogi.', script: 'ಸ್ವಲ್ಪ ಮೆಲ್ಲಗೆ ಹೋಗಿ.', roman: 'Swalpa = a little · mellage = slow', words: [{ w: 'Swalpa', m: 'a little' }, { w: 'mellage', m: 'slowly' }, { w: 'hogi', m: 'go' }] },
              { en: 'I am getting late, please go a bit fast.', native: 'Nange late aagthide, swalpa bega hogi.', script: 'ನನಗೆ ಲೇറ്റ് ಆಗ್तಿದೆ, ಸ್ವಲ್ಪ ಬೇഗ ಹೋಗಿ.', roman: 'bega = fast · Nange = to me', words: [{ w: 'Nange', m: 'to me' }, { w: 'bega', m: 'fast' }, { w: 'hogi', m: 'go' }] },
              { en: 'Please stop right here.', native: 'Illi nillisi.', script: 'ಇಲ್ಲಿ ನಿಲ್ಲಿಸಿ.', roman: 'Illi = here · nillisi = stop', words: [{ w: 'Illi', m: 'here' }, { w: 'nillisi', m: 'stop' }] },
              { en: 'Do you have change for 500 rupees?', native: 'Iynoornu (500) rupayi ge change idya?', script: 'ಐನೂರು ರೂಪಾಯಿಗೆ ಚೇಂಜ್ ಇದ್ಯಾ?', roman: 'idya = do you have?', words: [{ w: 'Iynoornu (500)', m: '500' }, { w: 'rupayi', m: 'rupees' }, { w: 'idya', m: 'do you have?' }] },
            ]
          },
          {
            id: 'hotel', icon: '🍽️', name: 'Restaurant', count: 10,
            desc: 'Food is a massive part of the culture, and knowing how to order and compliment the food will instantly win you smiles.',
            phrases: [
              { en: 'Do you have a table for two?', native: 'Ibbarige table idya?', script: 'ಇಬ್ಬರಿಗೆ ಟೇಬಲ್ ಇದ್ಯಾ?', roman: 'Ibbarige = for two people · idya = do you have?', words: [{ w: 'Ibbarige', m: 'for two' }, { w: 'idya', m: 'do you have?' }] },
              { en: 'Please give me the menu.', native: 'Menu kodi.', script: 'ಮೆನು ಕೊಡಿ.', roman: 'kodi = give (polite)', words: [{ w: 'kodi', m: 'give (polite)' }] },
              { en: 'What is today\'s special?', native: 'Ivattu special enu?', script: 'ಇವತ್ತು ಸ್ಪೆಷಲ್ ಏನು?', roman: 'Ivattu = today · enu = what', words: [{ w: 'Ivattu', m: 'today' }, { w: 'special', m: 'special' }, { w: 'enu', m: 'what?' }] },
              { en: 'Give me one plate Idli and one Coffee.', native: 'Ondu plate idli mathu ondu coffee kodi.', script: 'ಒಂದು ಪ್ಲೇಟ್ ಇಡ್ಲಿ ಮತ್ತು ಒಂದು ಕಾಫಿ ಕೊಡಿ.', roman: 'Ondu = one · mathu = and · kodi = give', words: [{ w: 'Ondu', m: 'one' }, { w: 'mathu', m: 'and' }, { w: 'kodi', m: 'give' }] },

    let currentLang = 'kn';
    let readCount = 0;
    let readSet = new Set();

    function applyTheme(lang) {
      document.body.className = 'theme-' + lang;
    }

    function setLang(lang, btn) {
      currentLang = lang;
      applyTheme(lang);
      document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      readSet = new Set(); readCount = 0;
      showHome();
    }

    function showHome() {
      document.getElementById('view-home').classList.add('active');
      document.getElementById('view-lesson').classList.remove('active');
      const d = DB[currentLang];
      document.getElementById('lang-desc').textContent = d.desc;
      document.getElementById('home-tip').innerHTML = '<strong>Tip:</strong> ' + d.tip;
      const grid = document.getElementById('scene-grid');
      grid.innerHTML = '';
      d.scenes.forEach(sc => {
        const c = document.createElement('button');
        c.className = 'scene-card';
        c.innerHTML = `<span class="scene-icon">${sc.icon}</span><div class="scene-name">${sc.name}</div><div class="scene-count">${sc.count} phrases</div>`;
        c.onclick = () => showLesson(sc.id);
        grid.appendChild(c);
      });
    }

    function showLesson(sceneId) {
      const sc = DB[currentLang].scenes.find(s => s.id === sceneId);
      document.getElementById('view-home').classList.remove('active');
      document.getElementById('view-lesson').classList.add('active');
      document.getElementById('lesson-title').textContent = sc.icon + ' ' + sc.name;
      document.getElementById('lesson-desc').textContent = sc.desc;

      const container = document.getElementById('phrases-container');
      container.innerHTML = '';

      const sceneKey = currentLang + '-' + sceneId;
      let sceneRead = 0;
      sc.phrases.forEach((p, i) => {
        const key = sceneKey + '-' + i;
        if (readSet.has(key)) sceneRead++;
      });
      updateProgress(sceneKey, sc, sceneRead);

      sc.phrases.forEach((p, i) => {
        const key = sceneKey + '-' + i;
        const card = document.createElement('div');
        card.className = 'phrase-card';
        card.id = 'card-' + i;

        const chips = p.words.map((w, j) => {
          const cleanWord = w.w.replace(/'/g, "\\'");
          return `<div class="word-chip" id="word-${i}-${j}" onclick="playWord(event, '${cleanWord}', '${currentLang}', 'word-${i}-${j}')">${w.w}<span>${w.m}</span></div>`;
        }).join('');

        card.innerHTML = `
      <div class="phrase-header">
        <div class="phrase-number">${String(i + 1).padStart(2, '0')}</div>
        <div class="phrase-english">"${p.en}"</div>
        <button class="speaker-btn" id="speaker-${i}" onclick="playPhrase(event, ${i}, '${p.native.replace(/'/g, "\\'")}', '${p.script ? p.script.replace(/'/g, "\\'") : ''}', '${currentLang}')" title="Listen to pronunciation">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
      </div>
      <div class="phrase-detail">
        <div class="phrase-script">${p.native}</div>
        ${p.script ? `<div class="phrase-native">${p.script}</div>` : ''}
        <div class="phrase-transliteration">${p.roman}</div>
        <div class="phrase-breakdown">${chips}</div>
      </div>
    `;

        card.onclick = () => {
          const wasExpanded = card.classList.contains('expanded');
          card.classList.toggle('expanded');
          if (!wasExpanded && !readSet.has(key)) {
            readSet.add(key); readCount++;
            let sr = 0;
            sc.phrases.forEach((_, j) => { if (readSet.has(sceneKey + '-' + j)) sr++; });
            updateProgress(sceneKey, sc, sr);
          }
        };
        container.appendChild(card);
      });
    }

    function updateProgress(sceneKey, sc, count) {
      const pct = Math.round((count / sc.count) * 100);
      document.getElementById('lesson-progress').style.width = pct + '%';
    }

    let currentUtterance = null;
    let speakingElement = null;
    let currentAudio = null;
    let retryCount = 0;

    function speakText(text, scriptText, langCode, elementId, isWord = false) {
      // 1. Cancel active speech (both HTML5 Audio and Web Speech synthesis)
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
      }
      
      // Clear visual states
      if (speakingElement) {
        speakingElement.classList.remove('speaking');
        speakingElement = null;
      }
      
      if (!text) return;

      // Use native script for phrase playback, or fall back to romanized text for single words
      const textToSpeak = (isWord ? text : scriptText) || text;
      
      const targetEl = document.getElementById(elementId);
      if (targetEl) {
        speakingElement = targetEl;
        speakingElement.classList.add('speaking');
      }

      // Determine language locale for Google TTS
      const gLangMap = { 'kn': 'kn', 'ta': 'ta', 'te': 'te', 'hi': 'hi', 'ml': 'ml' };
      const glang = gLangMap[langCode] || langCode;

      // Try Google Translate Neural Cloud TTS
      const cleanText = textToSpeak.replace(/\[|\]/g, '');
      const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${glang}&q=${encodeURIComponent(cleanText)}`;
      
      const audio = new Audio(url);
      currentAudio = audio;

      // Handle slow mode speed
      const speedBtn = document.getElementById('speed-toggle');
      const isSlow = speedBtn && speedBtn.classList.contains('active');
      const rate = isSlow ? 0.65 : (isWord ? 0.8 : 0.95);
      audio.defaultPlaybackRate = rate;
      audio.playbackRate = rate;

      audio.onended = () => {
        if (speakingElement === targetEl) {
          targetEl.classList.remove('speaking');
          speakingElement = null;
        }
        if (currentAudio === audio) {
          currentAudio = null;
        }
      };

      audio.onerror = () => {
        console.warn("Google TTS failed. Falling back to browser SpeechSynthesis.");
        speakTextFallback(text, langCode, elementId, isWord);
      };

      audio.play().catch(e => {
        console.warn("Audio play blocked/failed. Falling back to browser SpeechSynthesis:", e);
        speakTextFallback(text, langCode, elementId, isWord);
      });
    }

    function speakTextFallback(text, langCode, elementId, isWord = false) {
      if (!('speechSynthesis' in window)) {
        console.warn('Speech synthesis not supported in this browser.');
        return;
      }

      const voices = window.speechSynthesis.getVoices();
      
      if (voices.length === 0) {
        if (retryCount < 5) {
          retryCount++;
          setTimeout(() => speakTextFallback(text, langCode, elementId, isWord), 100);
        }
        return;
      }
      retryCount = 0;

      // Clean the text to speak
      const cleanText = text.replace(/\[|\]/g, '');

      const utterance = new SpeechSynthesisUtterance(cleanText);
      currentUtterance = utterance;

      const targetEl = document.getElementById(elementId);
      if (targetEl) {
        speakingElement = targetEl;
        speakingElement.classList.add('speaking');
      }

      const langMap = {
        'kn': 'kn-IN',
        'ta': 'ta-IN',
        'te': 'te-IN',
        'hi': 'hi-IN',
        'ml': 'ml-IN'
      };
      const targetLocale = langMap[langCode] || langCode;

      const matchLocale = (langA, langB) => {
        if (!langA || !langB) return false;
        const norm = l => l.toLowerCase().replace(/_/g, '-');
        return norm(langA) === norm(langB);
      };

      let voice = voices.find(v => matchLocale(v.lang, targetLocale));

      if (!voice) {
        voice = voices.find(v => matchLocale(v.lang, 'en-IN') && (v.name.includes('Heera') || v.name.includes('Ravi') || v.name.includes('Neerja') || v.name.includes('Prabhat')));
      }
      if (!voice) {
        voice = voices.find(v => matchLocale(v.lang, 'en-IN'));
      }
      if (!voice) {
        voice = voices.find(v => v.lang.toLowerCase().replace(/_/g, '-').includes('-in') || v.name.toLowerCase().includes('india'));
      }
      if (!voice) {
        voice = voices.find(v => v.lang.toLowerCase().startsWith('en-'));
      }

      if (voice) {
        utterance.voice = voice;
        utterance.lang = voice.lang;
        console.log(`Fallback voice selected for ${langCode} (${targetLocale}): ${voice.name} (${voice.lang})`);
      } else {
        utterance.lang = targetLocale;
      }

      const speedBtn = document.getElementById('speed-toggle');
      const isSlow = speedBtn && speedBtn.classList.contains('active');

      utterance.rate = isSlow ? 0.55 : (isWord ? 0.75 : 0.85);

      utterance.onend = () => {
        if (speakingElement === targetEl) {
          targetEl.classList.remove('speaking');
          speakingElement = null;
        }
        currentUtterance = null;
      };

      utterance.onerror = (e) => {
        console.error('SpeechSynthesis error:', e);
        if (speakingElement === targetEl) {
          targetEl.classList.remove('speaking');
          speakingElement = null;
        }
        currentUtterance = null;
      };

      window.speechSynthesis.speak(utterance);
    }

    function playPhrase(event, index, text, scriptText, langCode) {
      if (event) event.stopPropagation();
      speakText(text, scriptText, langCode, `speaker-${index}`, false);
    }

    function playWord(event, text, langCode, elementId) {
      if (event) event.stopPropagation();
      speakText(text, '', langCode, elementId, true);
    }

    function toggleSpeed() {
      const btn = document.getElementById('speed-toggle');
      if (btn) {
        btn.classList.toggle('active');
        const isActive = btn.classList.contains('active');
        const speedText = btn.querySelector('.speed-text');
        if (speedText) {
          speedText.textContent = isActive ? 'Slow Mode: On 🐢' : 'Slow Mode: Off';
        }
      }
    }

    // Warm up speech synthesis voices
    if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = () => {
          window.speechSynthesis.getVoices();
        };
      }
    }

    applyTheme(currentLang);
    showHome();
  </script>
</body>
