<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namma Convo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --surface-hover: #FFFFFF;
      --border: rgba(0, 0, 0, 0.06);
      --text-primary: #1D1D1F;
      --text-secondary: #86868B;
      --accent: #000000;
      --accent-light: rgba(0, 0, 0, 0.05);

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;

      --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 10px 40px rgba(0, 0, 0, 0.08);
      --shadow-active: 0 2px 6px rgba(0, 0, 0, 0.04);
      --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.02);

      --transition-snappy: 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── TYPOGRAPHY ─── */
    h1, h2, h3 {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 32px 24px 0;
      background: rgba(245, 245, 247, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      max-width: 860px;
      margin: 0 auto 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-primary);
    }

    .logo-sub {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .lang-tabs {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .lang-tabs::-webkit-scrollbar {
      display: none;
    }

    .lang-tab {
      padding: 12px 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color var(--transition-snappy);
      white-space: nowrap;
    }

    .lang-tab:hover {
      color: var(--text-primary);
    }

    .lang-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    /* ─── MAIN ─── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 120px;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* ─── LESSON HEADER ─── */
    .lesson-header {
      margin-bottom: 24px;
    }

    .lesson-eyebrow {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .lesson-title {
      font-size: 40px;
      line-height: 1.1;
      margin-bottom: 16px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .lesson-desc {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 640px;
      line-height: 1.4;
    }

    /* ─── STATS ─── */
    .stats-row {
      display: flex;
      gap: 32px;
      margin-bottom: 64px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ─── SCENE GRID ─── */
    .section-label {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .scene-card {
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: var(--radius-lg);
      padding: 32px;
      cursor: pointer;
      transition: transform var(--transition-snappy), box-shadow var(--transition-snappy);
      text-align: left;
      box-shadow: var(--shadow-card);
      will-change: transform, box-shadow;
    }

    .scene-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    
    .scene-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-active);
    }

    .scene-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .scene-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .scene-count {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ─── PHRASE CARDS ─── */
    .phrase-card {
      background: transparent;
      border-bottom: 1px solid var(--border);
      padding: 24px;
      cursor: pointer;
      transition: all var(--transition-snappy);
      position: relative;
      display: flex;
      flex-direction: column;
      will-change: transform, background;
      border-radius: var(--radius-md);
    }

    .phrase-card:first-child {
      border-top: 1px solid var(--border);
    }

    .phrase-card:hover {
      background: var(--surface);
      border-bottom-color: transparent;
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }
    
    .phrase-card:active {
      transform: scale(0.98);
    }

    .phrase-header {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .phrase-number {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 2px;
      min-width: 24px;
    }

    .phrase-english {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
      letter-spacing: -0.01em;
    }

    .phrase-detail {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all var(--transition-snappy);
      padding-left: 48px;
    }

    .phrase-card.expanded {
      background: var(--surface);
      border-bottom-color: transparent;
      margin: 12px 0;
      box-shadow: var(--shadow-hover);
      transform: none; /* Reset active scale */
    }
    
    .phrase-card.expanded:active {
      transform: scale(0.99); /* Less squish when expanded */
    }

    .phrase-card.expanded .phrase-detail {
      max-height: 400px;
      opacity: 1;
      margin-top: 24px;
    }

    .phrase-native {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .phrase-transliteration {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-weight: 500;
    }

    .phrase-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .word-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .word-chip span {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ─── TIP CARD ─── */
    .tip-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 24px 32px;
      margin-top: 48px;
      font-size: 15px;
      color: var(--text-secondary);
      display: flex;
      gap: 16px;
      align-items: flex-start;
      box-shadow: var(--shadow-sm);
    }

    .tip-card strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ─── UTILS ─── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 32px;
      transition: all var(--transition-snappy);
    }

    .back-link .chevron {
      font-size: 24px;
      font-weight: 400;
      line-height: 1;
      margin-top: -2px;
      transition: transform var(--transition-snappy);
    }

    .back-link:hover {
      color: var(--text-primary);
    }

    .back-link:hover .chevron {
      transform: translateX(-4px);
    }
    
    .back-link:active {
      transform: scale(0.95);
    }

    .progress-bar {
      height: 6px;
      background: rgba(0,0,0,0.06);
      border-radius: 3px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--text-primary);
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      .header {
        padding: 16px 16px 0;
      }

      .main {
        padding: 24px 16px 80px;
      }

      .lesson-title {
        font-size: 32px;
      }

      .lesson-desc {
        font-size: 16px;
      }

      .stats-row {
        gap: 24px;
        margin-bottom: 48px;
        flex-wrap: wrap;
      }

      .stat-num {
        font-size: 28px;
      }

      .scene-grid {
        grid-template-columns: 1fr;
      }

      .phrase-card {
        padding: 20px 16px;
      }

      .phrase-card.expanded {
        margin: 8px 0;
      }

      .phrase-detail {
        padding-left: 0;
      }

      .phrase-english {
        font-size: 18px;
      }

      .phrase-native {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-top">
      <div class="logo">Namma Convo</div>
    </div>
    <div class="lang-tabs">
      <button class="lang-tab active" onclick="setLang('kn',this)">Kannada</button>
      <button class="lang-tab" onclick="setLang('ta',this)">Tamil</button>
      <button class="lang-tab" onclick="setLang('te',this)">Telugu</button>
      <button class="lang-tab" onclick="setLang('hi',this)">Hindi</button>
      <button class="lang-tab" onclick="setLang('ml',this)">Malayalam</button>
    </div>
  </div>

  <div class="main">
    <div class="view active" id="view-home">
      <div class="lesson-header">
        <div class="lesson-desc" id="lang-desc">Practical phrases for daily life in Karnataka. Locals always appreciate
          the effort — even a few words go a long way.</div>
      </div>
      <div class="scene-grid" id="scene-grid"></div>
      <div class="tip-card" id="home-tip"></div>
    </div>

    <div class="view" id="view-lesson">
      <div class="back-link" onclick="showHome()"><span class="chevron">&#8249;</span> Back</div>
      <div class="lesson-header">
        <div class="lesson-title" id="lesson-title"></div>
        <div class="lesson-desc" id="lesson-desc"></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="lesson-progress"></div>
      </div>
      <div id="phrases-container"></div>
    </div>
  </div>

  <script>
    const DB = {
      kn: {
        desc: ' Locals always appreciate the effort, even if you just mix a few Kannada words with English!',
        tip: 'If you ever get stuck, just smile and say "Kannada swalpa swalpa barutte" (I only know a little bit of Kannada). It instantly lightens the mood and shows you are trying!',
        scenes: [
          {
            id: 'auto', icon: '🛺', name: 'Auto Driver', count: 10,
            desc: 'When interacting with auto drivers in Bengaluru or other parts of Karnataka, a polite Namaskara saar (Hello, sir) goes a long way.',
            phrases: [
              { en: 'Will you come to [Location]?', native: '[Location] ge barthira?', roman: 'ge = to · barthira = will you come?', words: [{ w: 'ge', m: 'to' }, { w: 'barthira', m: 'will you come?' }] },
              { en: 'How much will it cost to go there?', native: 'Alli ge eshtu agutte?', roman: 'Alli = there · eshtu = how much', words: [{ w: 'Alli', m: 'there' }, { w: 'eshtu', m: 'how much' }, { w: 'agutte', m: 'will it be?' }] },
              { en: 'Please turn on the meter.', native: 'Meter haki, sir.', roman: 'haki = put / turn on', words: [{ w: 'Meter', m: 'meter' }, { w: 'haki', m: 'put/turn on' }] },
              { en: 'I am standing at the location.', native: 'Location alli nintu kondidini.', roman: 'alli = at · nintu kondidini = standing', words: [{ w: 'alli', m: 'at / there' }, { w: 'nintu', m: 'standing' }, { w: 'kondidini', m: 'I am' }] },
              { en: 'Can you show the scanner / QR code?', native: 'Scanner thoristhira?', roman: 'thoristhira = will you show?', words: [{ w: 'thoristhira', m: 'will you show?' }] },
              { en: 'Please go straight, then take a left.', native: 'Straight hogi, aamele left thagolli.', roman: 'hogi = go · aamele = then · thagolli = take', words: [{ w: 'hogi', m: 'go' }, { w: 'aamele', m: 'then' }, { w: 'thagolli', m: 'take' }] },
              { en: 'Please drive a little slower.', native: 'Swalpa mellage hogi.', roman: 'Swalpa = a little · mellage = slow', words: [{ w: 'Swalpa', m: 'a little' }, { w: 'mellage', m: 'slowly' }, { w: 'hogi', m: 'go' }] },
              { en: 'I am getting late, please go a bit fast.', native: 'Nange late aagthide, swalpa bega hogi.', roman: 'bega = fast · Nange = to me', words: [{ w: 'Nange', m: 'to me' }, { w: 'bega', m: 'fast' }, { w: 'hogi', m: 'go' }] },
              { en: 'Please stop right here.', native: 'Illi nillisi.', roman: 'Illi = here · nillisi = stop', words: [{ w: 'Illi', m: 'here' }, { w: 'nillisi', m: 'stop' }] },
              { en: 'Do you have change for 500 rupees?', native: 'Iynoornu (500) rupayi ge change idya?', roman: 'idya = do you have?', words: [{ w: 'Iynoornu (500)', m: '500' }, { w: 'rupayi', m: 'rupees' }, { w: 'idya', m: 'do you have?' }] },
            ]
          },
          {
            id: 'hotel', icon: '🍽️', name: 'Restaurant', count: 10,
            desc: 'Food is a massive part of the culture, and knowing how to order and compliment the food will instantly win you smiles.',
            phrases: [
              { en: 'Do you have a table for two?', native: 'Ibbarige table idya?', roman: 'Ibbarige = for two people · idya = do you have?', words: [{ w: 'Ibbarige', m: 'for two' }, { w: 'idya', m: 'do you have?' }] },
              { en: 'Please give me the menu.', native: 'Menu kodi.', roman: 'kodi = give (polite)', words: [{ w: 'kodi', m: 'give (polite)' }] },
              { en: 'What is today\'s special?', native: 'Ivattu special enu?', roman: 'Ivattu = today · enu = what', words: [{ w: 'Ivattu', m: 'today' }, { w: 'special', m: 'special' }, { w: 'enu', m: 'what?' }] },
              { en: 'Give me one plate Idli and one Coffee.', native: 'Ondu plate idli mathu ondu coffee kodi.', roman: 'Ondu = one · mathu = and · kodi = give', words: [{ w: 'Ondu', m: 'one' }, { w: 'mathu', m: 'and' }, { w: 'kodi', m: 'give' }] },
              { en: 'Please give us some drinking water.', native: 'Kudiyoke neeru kodi.', roman: 'Kudiyoke = for drinking · neeru = water', words: [{ w: 'Kudiyoke', m: 'to drink' }, { w: 'neeru', m: 'water' }, { w: 'kodi', m: 'give' }] },
              { en: 'Make it a little spicy, please.', native: 'Swalpa khara madi.', roman: 'khara = spicy · madi = make/do', words: [{ w: 'Swalpa', m: 'a little' }, { w: 'khara', m: 'spicy' }, { w: 'madi', m: 'make/do' }] },
              { en: 'Where is the washroom?', native: 'Washroom elli ide?', roman: 'elli ide = where is it?', words: [{ w: 'elli', m: 'where' }, { w: 'ide', m: 'is it?' }] },
              { en: 'The food is very good!', native: 'Oota tumba chennagide!', roman: 'Oota = food · tumba = very · chennagide = nice', words: [{ w: 'Oota', m: 'food' }, { w: 'tumba', m: 'very' }, { w: 'chennagide', m: 'it is nice' }] },
              { en: 'Please bring the bill.', native: 'Bill kodi.', roman: 'kodi = give (polite)', words: [{ w: 'Bill', m: 'bill' }, { w: 'kodi', m: 'give' }] },
              { en: 'I will pay using Google Pay / PhonePe.', native: 'Naanu G-pay/PhonePe alli pay madthini.', roman: 'Naanu = I · alli = using', words: [{ w: 'Naanu', m: 'I' }, { w: 'alli', m: 'using' }, { w: 'madthini', m: 'will do' }] },
            ]
          }
        ]
      },
      ta: {
        desc: 'Tamil is one of the world\'s oldest classical languages. These phrases work across Tamil Nadu and Chennai.',
        tip: 'Tamil speakers appreciate when you say "Romba nandri" (thank you so much) — the "romba" adds warmth.',
        scenes: [
          {
            id: 'auto', icon: '🛺', name: 'Auto Driver', count: 10,
            desc: 'Essential phrases for getting around Chennai and Tamil Nadu by auto.',
            phrases: [
              { en: 'Will you come to [Location]?', native: '[Location] varuveenga?', roman: 'varuveenga = will you come? (polite)', words: [{ w: 'varuveenga', m: 'will you come?' }] },
              { en: 'How much will it cost to go there?', native: 'Anga poga evvalavu aagum?', roman: 'Anga = there · poga = to go · evvalavu = how much', words: [{ w: 'Anga', m: 'there' }, { w: 'evvalavu', m: 'how much' }, { w: 'aagum', m: 'will be' }] },
              { en: 'Please turn on the meter.', native: 'Meter podunga.', roman: 'podunga = put/turn on', words: [{ w: 'Meter', m: 'meter' }, { w: 'podunga', m: 'turn on' }] },
              { en: 'I am standing at the location.', native: 'Location-la ninnutu iruken.', roman: 'la = at · ninnutu = standing · iruken = I am', words: [{ w: 'Location-la', m: 'at location' }, { w: 'ninnutu', m: 'standing' }, { w: 'iruken', m: 'I am' }] },
              { en: 'Can you show the scanner / QR code?', native: 'Scanner kaamipingala?', roman: 'kaamipingala = will you show?', words: [{ w: 'Scanner', m: 'scanner' }, { w: 'kaamipingala', m: 'will you show?' }] },
              { en: 'Please go straight, then take a left.', native: 'Nere ponga, apram left edunga.', roman: 'Nere = straight · apram = then · edunga = take', words: [{ w: 'Nere', m: 'straight' }, { w: 'apram', m: 'then' }, { w: 'edunga', m: 'take' }] },
              { en: 'Please drive a little slower.', native: 'Konjam methuva ponga.', roman: 'Konjam = a little · methuva = slowly', words: [{ w: 'Konjam', m: 'a little' }, { w: 'methuva', m: 'slowly' }, { w: 'ponga', m: 'go' }] },
              { en: 'I am getting late, please go a bit fast.', native: 'Enaku late aaguthu, konjam fast-a ponga.', roman: 'Enaku = to me · late aaguthu = getting late · fast-a = fast', words: [{ w: 'Enaku', m: 'to me' }, { w: 'late aaguthu', m: 'getting late' }, { w: 'konjam', m: 'a little' }, { w: 'ponga', m: 'go' }] },
              { en: 'Please stop right here.', native: 'Inga niruthunga.', roman: 'Inga = here · niruthunga = please stop', words: [{ w: 'Inga', m: 'here' }, { w: 'niruthunga', m: 'stop' }] },
              { en: 'Do you have change for 500 rupees?', native: 'Aiynooru (500) ruba ku change irukka?', roman: 'ruba ku = for rupees · irukka = do you have?', words: [{ w: 'Aiynooru (500)', m: '500' }, { w: 'ruba', m: 'rupees' }, { w: 'irukka', m: 'do you have?' }] },
            ]
          },
          {
            id: 'food', icon: '🍽️', name: 'Restaurant', count: 10,
            desc: 'Order food and compliment the cook in Tamil.',
            phrases: [
              { en: 'Do you have a table for two?', native: 'Rendu peruku table irukka?', roman: 'Rendu = two · peruku = for people · irukka = is there?', words: [{ w: 'Rendu', m: 'two' }, { w: 'peruku', m: 'for people' }, { w: 'irukka', m: 'is there?' }] },
              { en: 'Please give me the menu.', native: 'Menu kudunga.', roman: 'kudunga = give (polite)', words: [{ w: 'Menu', m: 'menu' }, { w: 'kudunga', m: 'give' }] },
              { en: 'What is today\'s special?', native: 'Inniku special enna?', roman: 'Inniku = today · enna = what', words: [{ w: 'Inniku', m: 'today' }, { w: 'special', m: 'special' }, { w: 'enna', m: 'what?' }] },
              { en: 'Give me one plate Idli and one Coffee.', native: 'Oru plate idli mattum oru coffee kudunga.', roman: 'Oru = one · mattum = and · kudunga = give', words: [{ w: 'Oru', m: 'one' }, { w: 'mattum', m: 'and' }, { w: 'kudunga', m: 'give' }] },

    let currentLang = 'kn';
    let readCount = 0;
    let readSet = new Set();

    function applyTheme(lang) {
      document.body.className = 'theme-' + lang;
    }

    function setLang(lang, btn) {
      currentLang = lang;
      applyTheme(lang);
      document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      readSet = new Set(); readCount = 0;
      showHome();
    }

    function showHome() {
      document.getElementById('view-home').classList.add('active');
      document.getElementById('view-lesson').classList.remove('active');
      const d = DB[currentLang];
      document.getElementById('lang-desc').textContent = d.desc;
      document.getElementById('home-tip').innerHTML = '<strong>Tip:</strong> ' + d.tip;
      const grid = document.getElementById('scene-grid');
      grid.innerHTML = '';
      d.scenes.forEach(sc => {
        const c = document.createElement('button');
        c.className = 'scene-card';
        c.innerHTML = `<span class="scene-icon">${sc.icon}</span><div class="scene-name">${sc.name}</div><div class="scene-count">${sc.count} phrases</div>`;
        c.onclick = () => showLesson(sc.id);
        grid.appendChild(c);
      });
    }

    function showLesson(sceneId) {
      const sc = DB[currentLang].scenes.find(s => s.id === sceneId);
      document.getElementById('view-home').classList.remove('active');
      document.getElementById('view-lesson').classList.add('active');
      document.getElementById('lesson-title').textContent = sc.icon + ' ' + sc.name;
      document.getElementById('lesson-desc').textContent = sc.desc;

      const container = document.getElementById('phrases-container');
      container.innerHTML = '';

      const sceneKey = currentLang + '-' + sceneId;
      let sceneRead = 0;
      sc.phrases.forEach((p, i) => {
        const key = sceneKey + '-' + i;
        if (readSet.has(key)) sceneRead++;
      });
      updateProgress(sceneKey, sc, sceneRead);

      sc.phrases.forEach((p, i) => {
        const key = sceneKey + '-' + i;
        const card = document.createElement('div');
        card.className = 'phrase-card';
        card.id = 'card-' + i;

        const chips = p.words.map(w => `<div class="word-chip">${w.w}<span>${w.m}</span></div>`).join('');

        card.innerHTML = `
      <div class="phrase-header">
        <div class="phrase-number">${String(i + 1).padStart(2, '0')}</div>
        <div class="phrase-english">"${p.en}"</div>
      </div>
      <div class="phrase-detail">
        <div class="phrase-native">${p.native}</div>
        <div class="phrase-transliteration">${p.roman}</div>
        <div class="phrase-breakdown">${chips}</div>
      </div>
    `;

        card.onclick = () => {
          const wasExpanded = card.classList.contains('expanded');
          card.classList.toggle('expanded');
          if (!wasExpanded && !readSet.has(key)) {
            readSet.add(key); readCount++;
            let sr = 0;
            sc.phrases.forEach((_, j) => { if (readSet.has(sceneKey + '-' + j)) sr++; });
            updateProgress(sceneKey, sc, sr);
          }
        };
        container.appendChild(card);
      });
    }

    function updateProgress(sceneKey, sc, count) {
      const pct = Math.round((count / sc.count) * 100);
      document.getElementById('lesson-progress').style.width = pct + '%';
    }

    applyTheme(currentLang);
    showHome();
  </script>
